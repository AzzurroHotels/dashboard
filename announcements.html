<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'DM Sans',-apple-system,sans-serif;min-height:100vh;background:linear-gradient(to bottom,#87CEEB 0%,#4A9FBF 30%,#1E7491 60%,#0D5E7A 75%,#d4b896 90%,#c9a981 100%);background-attachment:fixed;color:#1e293b}

        .page{max-width:820px;margin:0 auto;padding:32px 24px}

        /* Header */
        .page-header{margin-bottom:28px}
        .page-header h1{font-family:'Playfair Display',serif;font-size:26px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.2);margin-bottom:4px}
        .page-header p{color:rgba(255,255,255,.7);font-size:13px}

        /* Post form */
        .post-card{background:rgba(255,255,255,.15);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.25);border-radius:18px;padding:24px;margin-bottom:28px}
        .post-card h2{color:#fff;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .field{margin-bottom:14px}
        .field label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.75);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
        .field input,.field textarea,.field select{width:100%;padding:11px 14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:10px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:.2s;resize:none}
        .field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,.4)}
        .field input:focus,.field textarea:focus,.field select:focus{border-color:rgba(196,168,119,.5);background:rgba(255,255,255,.18)}
        .field select option{background:#1e4a6b;color:#fff}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .post-btn{padding:11px 28px;border-radius:10px;border:none;background:linear-gradient(135deg,#C4A877,#B89860);color:#0F172A;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;box-shadow:0 4px 14px rgba(196,168,119,.3)}
        .post-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(196,168,119,.4)}
        .post-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

        /* Toast */
        .toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;opacity:0;transform:translateY(-8px);transition:.3s;pointer-events:none}
        .toast.show{opacity:1;transform:translateY(0)}
        .toast.ok{background:rgba(22,163,74,.9);color:#fff;border:1px solid rgba(22,163,74,.4)}
        .toast.err{background:rgba(239,68,68,.9);color:#fff;border:1px solid rgba(239,68,68,.4)}

        /* Announcements list */
        .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .list-header h2{color:#fff;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
        .filter-bar{display:flex;gap:8px}
        .filter-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
        .filter-btn.active{background:rgba(255,255,255,.22);color:#fff;border-color:rgba(255,255,255,.35)}

        .ann-card{background:rgba(255,255,255,.13);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:20px 22px;margin-bottom:12px;transition:.2s;position:relative}
        .ann-card:hover{background:rgba(255,255,255,.18);transform:translateY(-1px)}
        .ann-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
        .ann-title{color:#fff;font-size:16px;font-weight:700;line-height:1.3}
        .ann-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
        .badge-general{background:rgba(100,180,255,.2);color:#93c5fd;border:1px solid rgba(100,180,255,.25)}
        .badge-urgent{background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
        .badge-maintenance{background:rgba(251,191,36,.2);color:#fde68a;border:1px solid rgba(251,191,36,.25)}
        .badge-hr{background:rgba(167,139,250,.2);color:#c4b5fd;border:1px solid rgba(167,139,250,.25)}
        .badge-operations{background:rgba(52,211,153,.2);color:#6ee7b7;border:1px solid rgba(52,211,153,.25)}
        .ann-body{color:rgba(255,255,255,.8);font-size:14px;line-height:1.6;margin-bottom:12px}
        .ann-footer{display:flex;align-items:center;justify-content:space-between}
        .ann-meta{color:rgba(255,255,255,.45);font-size:11px;display:flex;align-items:center;gap:12px}
        .ann-author{display:flex;align-items:center;gap:6px}
        .ann-avatar{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#C4A877,#E8D5B0);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#0F172A}
        .delete-btn{background:none;border:none;color:rgba(255,100,100,.5);font-size:13px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:.2s;font-family:inherit}
        .delete-btn:hover{color:#fca5a5;background:rgba(239,68,68,.1)}

        /* Empty / Loading */
        .empty{text-align:center;padding:48px 24px;color:rgba(255,255,255,.4)}
        .empty .icon{font-size:40px;margin-bottom:12px}
        .empty p{font-size:14px}
        .loader{text-align:center;padding:40px;color:rgba(255,255,255,.5);font-size:13px}

        /* Pinned indicator */
        .pinned-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:rgba(196,168,119,.9);text-transform:uppercase;letter-spacing:.5px}
        .ann-card.pinned{border-color:rgba(196,168,119,.35);background:rgba(196,168,119,.1)}
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="page">
    <div class="page-header">
        <h1>📢 Announcements</h1>
        <p>Stay up to date with the latest updates from management</p>
    </div>

    <!-- Post Form (admin only) -->
    <div class="post-card" id="postForm" style="display:none">
        <h2>✏️ Post New Announcement</h2>
        <div class="field">
            <label>Title</label>
            <input type="text" id="annTitle" placeholder="Announcement title...">
        </div>
        <div class="field">
            <label>Message</label>
            <textarea id="annBody" rows="4" placeholder="Write your announcement here..."></textarea>
        </div>
        <div class="form-row">
            <div class="field">
                <label>Category</label>
                <select id="annCategory">
                    <option value="general">General</option>
                    <option value="urgent">🚨 Urgent</option>
                    <option value="operations">Operations</option>
                    <option value="hr">HR</option>
                    <option value="maintenance">Maintenance</option>
                </select>
            </div>
            <div class="field">
                <label>Pin to top?</label>
                <select id="annPinned">
                    <option value="false">No</option>
                    <option value="true">Yes — pin this</option>
                </select>
            </div>
        </div>
        <button class="post-btn" id="submitBtn" onclick="postAnnouncement()">Post Announcement</button>
    </div>

    <!-- List -->
    <div class="list-header">
        <h2>📋 All Announcements</h2>
        <div class="filter-bar">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('urgent', this)">Urgent</button>
            <button class="filter-btn" onclick="setFilter('operations', this)">Ops</button>
            <button class="filter-btn" onclick="setFilter('hr', this)">HR</button>
        </div>
    </div>
    <div id="annList"><div class="loader">Loading announcements...</div></div>
</div>

<script type="module">
import { supabase } from './supabase-config.js';

let userRole = 'staff', userId = null, currentFilter = 'all';

// Get current user + role
async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return;
    userId = session.user.id;

    const { data: profile } = await supabase.from('profiles').select('role, full_name').eq('id', userId).single();
    if (profile) {
        userRole = profile.role;
        if (userRole === 'admin') {
            document.getElementById('postForm').style.display = 'block';
        }
    }
    loadAnnouncements();
}

// Load announcements from Supabase
async function loadAnnouncements() {
    let query = supabase
        .from('announcements')
        .select('*, profiles(full_name)')
        .order('pinned', { ascending: false })
        .order('created_at', { ascending: false });

    if (currentFilter !== 'all') {
        query = query.eq('category', currentFilter);
    }

    const { data, error } = await query;
    const list = document.getElementById('annList');

    if (error) {
        // Table may not exist yet — show setup hint
        list.innerHTML = `
            <div class="empty">
                <div class="icon">🗄️</div>
                <p style="color:rgba(255,255,255,.6);margin-bottom:8px">Announcements table not found.</p>
                <p style="font-size:12px">Run the SQL below in your Supabase dashboard to set it up:</p>
                <pre style="margin-top:14px;padding:14px;background:rgba(0,0,0,.25);border-radius:10px;text-align:left;font-size:11px;color:#93c5fd;line-height:1.7;overflow-x:auto">CREATE TABLE announcements (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  created_at timestamptz DEFAULT now(),
  title text NOT NULL,
  body text NOT NULL,
  category text DEFAULT 'general',
  pinned boolean DEFAULT false,
  created_by uuid REFERENCES profiles(id)
);

ALTER TABLE announcements ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Everyone can read" ON announcements FOR SELECT USING (true);
CREATE POLICY "Admins can insert" ON announcements FOR INSERT
  WITH CHECK (EXISTS (SELECT 1 FROM profiles WHERE id = auth.uid() AND role = 'admin'));
CREATE POLICY "Admins can delete" ON announcements FOR DELETE
  USING (EXISTS (SELECT 1 FROM profiles WHERE id = auth.uid() AND role = 'admin'));</pre>
            </div>`;
        return;
    }

    if (!data || !data.length) {
        list.innerHTML = `<div class="empty"><div class="icon">📭</div><p>No announcements yet.</p></div>`;
        return;
    }

    list.innerHTML = data.map(a => {
        const authorName = a.profiles?.full_name || 'Admin';
        const initials = authorName.split(' ').map(n => n[0]).join('').toUpperCase();
        const date = new Date(a.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
        const time = new Date(a.created_at).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
        const cat = a.category || 'general';
        const deleteBtn = userRole === 'admin'
            ? `<button class="delete-btn" onclick="deleteAnn('${a.id}')">🗑 Delete</button>`
            : '';
        return `
        <div class="ann-card ${a.pinned ? 'pinned' : ''}" id="ann-${a.id}">
            <div class="ann-top">
                <div>
                    ${a.pinned ? '<div class="pinned-tag">📌 Pinned</div>' : ''}
                    <div class="ann-title">${escHtml(a.title)}</div>
                </div>
                <span class="ann-badge badge-${cat}">${cat.charAt(0).toUpperCase()+cat.slice(1)}</span>
            </div>
            <div class="ann-body">${escHtml(a.body)}</div>
            <div class="ann-footer">
                <div class="ann-meta">
                    <div class="ann-author">
                        <div class="ann-avatar">${initials}</div>
                        ${escHtml(authorName)}
                    </div>
                    <span>${date} · ${time}</span>
                </div>
                ${deleteBtn}
            </div>
        </div>`;
    }).join('');
}

// Post announcement
window.postAnnouncement = async function() {
    const title = document.getElementById('annTitle').value.trim();
    const body = document.getElementById('annBody').value.trim();
    const category = document.getElementById('annCategory').value;
    const pinned = document.getElementById('annPinned').value === 'true';

    if (!title || !body) { showToast('Please fill in title and message.', 'err'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Posting...';

    const { error } = await supabase.from('announcements').insert({
        title, body, category, pinned, created_by: userId
    });

    btn.disabled = false; btn.textContent = 'Post Announcement';

    if (error) { showToast('Error posting: ' + error.message, 'err'); return; }

    document.getElementById('annTitle').value = '';
    document.getElementById('annBody').value = '';
    document.getElementById('annCategory').value = 'general';
    document.getElementById('annPinned').value = 'false';
    showToast('Announcement posted!', 'ok');
    loadAnnouncements();
};

// Delete
window.deleteAnn = async function(id) {
    if (!confirm('Delete this announcement?')) return;
    const { error } = await supabase.from('announcements').delete().eq('id', id);
    if (error) { showToast('Error: ' + error.message, 'err'); return; }
    document.getElementById('ann-' + id)?.remove();
    showToast('Deleted.', 'ok');
};

// Filter
window.setFilter = function(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    loadAnnouncements();
};

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\n/g,'<br>');
}

init();
</script>
</body>
</html>
